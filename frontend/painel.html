<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera | Painel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 950: '#020617', 900: '#0f172a', 500: '#3b82f6' } } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col md:flex-row min-h-screen">
    <aside class="w-full md:w-72 bg-brand-900 text-white p-8 flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-12"><i class="fa-solid fa-brain text-brand-500 text-2xl"></i><span class="font-black text-2xl uppercase tracking-tighter">Synthera</span></div>
        <nav class="flex-grow space-y-4">
            <a href="#" class="flex items-center gap-3 p-4 bg-brand-500 rounded-2xl font-bold shadow-lg shadow-blue-500/20"><i class="fa-solid fa-chart-line"></i> Painel</a>
            <a href="teste.html" class="flex items-center gap-3 p-4 hover:bg-slate-800 rounded-2xl transition"><i class="fa-solid fa-clipboard-check"></i> Fazer Teste</a>
            <a href="blog.html" class="flex items-center gap-3 p-4 hover:bg-slate-800 rounded-2xl transition"><i class="fa-solid fa-newspaper"></i> Blog</a>
        </nav>
        <button id="btn-logout" class="mt-auto flex items-center gap-3 p-4 text-red-400 font-bold"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </aside>

    <main class="flex-grow p-6 md:p-12">
        <header class="mb-12 flex items-center gap-6">
            <a href="index.html" class="w-12 h-12 rounded-full bg-white flex items-center justify-center border border-slate-200 hover:bg-slate-100 transition shadow-sm" title="Voltar"><i class="fa-solid fa-arrow-left text-brand-900"></i></a>
            <div><h1 class="text-4xl font-black text-brand-900" id="welcome-msg">Bem-vindo</h1><p class="text-slate-500 font-medium">Sua inteligência comportamental aplicada.</p></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
            <div class="lg:col-span-2 bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm flex items-center gap-10">
                <div id="perfil-icon" class="w-24 h-24 rounded-3xl flex items-center justify-center text-white text-5xl font-black bg-slate-200 transition-all duration-700">?</div>
                <div><span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Seu Perfil Principal</span><h2 class="text-4xl font-black mt-2" id="perfil-nome">Pendente</h2></div>
            </div>
            <div class="bg-brand-950 text-white p-10 rounded-[2.5rem] flex flex-col justify-center">
                <span class="text-slate-500 text-xs font-bold uppercase mb-4">Status da Avaliação</span>
                <h3 class="text-2xl font-bold mb-4" id="status-txt">Incompleto</h3>
                <div class="w-full bg-slate-800 h-3 rounded-full"><div id="progresso-bar" class="bg-brand-500 h-full transition-all duration-1000" style="width: 0%"></div></div>
            </div>
        </div>

        <h3 class="text-2xl font-black mb-8 flex items-center gap-3"><i class="fa-solid fa-briefcase text-brand-500"></i> Sugestões de Carreira</h3>
        <div id="carreira-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="p-8 text-slate-400 italic">Realize o teste para ver as recomendações.</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nome = localStorage.getItem('synthera_user_nome') || 'Usuário';
            const scores = JSON.parse(localStorage.getItem('synthera_scores'));
            document.getElementById('welcome-msg').textContent = `Olá, ${nome.split(' ')[0]}!`;

            const mapping = {
                'D': { titulo: 'Dominância', cor: 'bg-red-500', carreiras: ['Diretor Executivo', 'Vendas B2B', 'Gerente de Projetos', 'Advogado'] },
                'I': { titulo: 'Influência', cor: 'bg-yellow-400', carreiras: ['Marketing', 'RH', 'Palestrante', 'Relações Públicas'] },
                'S': { titulo: 'Estabilidade', cor: 'bg-green-500', carreiras: ['Administrador', 'Educador', 'Sucesso do Cliente', 'Logística'] },
                'C': { titulo: 'Conformidade', cor: 'bg-blue-500', carreiras: ['Desenvolvedor TI', 'Analista de Dados', 'Auditor', 'Engenheiro'] }
            };

            if (scores) {
                const dom = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                const info = mapping[dom];
                document.getElementById('perfil-nome').textContent = info.titulo;
                document.getElementById('perfil-icon').textContent = dom;
                document.getElementById('perfil-icon').className = `w-24 h-24 rounded-3xl flex items-center justify-center text-white text-5xl font-black ${info.cor}`;
                document.getElementById('status-txt').textContent = 'Concluído';
                document.getElementById('progresso-bar').style.width = '100%';
                document.getElementById('carreira-container').innerHTML = info.carreiras.map(c => `<div class="bg-white p-6 rounded-2xl border border-slate-200 hover:border-brand-500 transition shadow-sm"><h4 class="font-bold text-slate-900">${c}</h4><p class="text-xs text-brand-500 mt-2 font-bold uppercase">Match Perfeito</p></div>`).join('');
            }

            document.getElementById('btn-logout').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };
        });
    </script>
</body>
</html>
