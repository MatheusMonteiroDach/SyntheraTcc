<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Synthera | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen px-6">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black italic">SYNTHERA</h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase mt-2">Escolha seu perfil</p>
        </div>
        <div class="flex bg-slate-100 p-1 rounded-2xl mb-8">
            <button id="perfil-aluno" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white text-blue-600 shadow-sm">Sou Aluno</button>
            <button id="perfil-gestor" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-500">Sou Gestor</button>
        </div>
        <div id="auth-tabs" class="flex mb-8 border-b">
            <button id="tab-login" class="flex-1 pb-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600">Login</button>
            <button id="tab-register" class="flex-1 pb-3 text-sm font-bold text-slate-400">Cadastro</button>
        </div>
        <form id="auth-form" class="space-y-4">
            <div id="name-field" class="hidden"><input type="text" id="nome" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Nome"></div>
            <input type="email" id="email" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="E-mail">
            <input type="password" id="senha" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Senha">
            <button type="submit" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold">Entrar</button>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
