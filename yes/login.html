<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera | Acesso Seguro</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 md:p-6 lg:p-12">

    <div class="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl w-full max-w-lg my-auto transition-all">
        
        <div class="text-center mb-6 md:mb-8">
            <h2 class="text-2xl md:text-3xl font-black italic tracking-tighter text-slate-900 uppercase">SYNTHERA<span class="text-blue-600">.</span></h2>
            <p class="text-slate-400 font-bold text-[9px] md:text-[10px] uppercase tracking-widest mt-2">Inteligência e Carreira</p>
        </div>

        <div class="flex bg-slate-100 p-1 rounded-2xl mb-6 md:mb-8">
            <button type="button" id="btn-aluno" class="flex-1 py-2.5 md:py-3 rounded-xl text-xs md:text-sm font-bold bg-white text-blue-600 shadow-sm transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> Aluno
            </button>
            <button type="button" id="btn-gestor" class="flex-1 py-2.5 md:py-3 rounded-xl text-xs md:text-sm font-bold text-slate-500 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-tie"></i> Gestor
            </button>
        </div>

        <div id="auth-tabs" class="flex mb-6 md:mb-8 border-b border-slate-100">
            <button id="tab-login" class="flex-1 pb-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition-all">Entrar</button>
            <button id="tab-register" class="flex-1 pb-3 text-sm font-bold text-slate-400 transition-all">Cadastre-se</button>
        </div>

        <form id="auth-form" class="space-y-4 md:space-y-5">
            
            <div id="register-fields" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nome Completo</label>
                    <input type="text" id="nome" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="Ex: Matheus Monteiro">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">CPF</label>
                        <input type="text" id="cpf" maxlength="14" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="000.000.000-00">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">CEP</label>
                        <input type="text" id="cep" maxlength="9" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="00000-000">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                    <div class="sm:col-span-3">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Rua / Logradouro</label>
                        <input type="text" id="rua" disabled class="w-full p-3.5 md:p-4 bg-slate-200 border border-slate-100 rounded-2xl outline-none text-slate-500 text-sm" placeholder="...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nº</label>
                        <input type="text" id="numero" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="123">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Bairro</label>
                        <input type="text" id="bairro" disabled class="w-full p-3.5 md:p-4 bg-slate-200 border border-slate-100 rounded-2xl outline-none text-slate-500 text-sm" placeholder="...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Complemento</label>
                        <input type="text" id="complemento" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="Ex: Apto 42">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cidade/UF</label>
                    <input type="text" id="cidade-uf" disabled class="w-full p-3.5 md:p-4 bg-slate-200 border border-slate-100 rounded-2xl outline-none text-slate-500 text-sm" placeholder="...">
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">E-mail</label>
                    <input type="email" id="email" required class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="seu@email.com">
                </div>
                
                <div id="confirm-email-box" class="hidden">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Confirme seu E-mail</label>
                    <input type="email" id="confirm-email" class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="repita seu e-mail">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Senha</label>
                    <div class="relative">
                        <input type="password" id="senha" required class="w-full p-3.5 md:p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition text-sm" placeholder="••••••••">
                        <button type="button" id="toggle-senha" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                    <p id="senha-hint" class="text-[10px] text-slate-400 mt-2 hidden px-2"><i class="fa-solid fa-circle-info text-blue-500"></i> Mínimo 8 caracteres, letras e números.</p>
                </div>
            </div>

            <div id="termos-box" class="hidden mt-4 p-4 bg-blue-50 border border-blue-100 rounded-2xl flex items-start gap-3">
                <input type="checkbox" id="termos" class="mt-1 w-5 h-5 accent-blue-600 cursor-pointer shrink-0">
                <label for="termos" class="text-[11px] md:text-xs text-slate-600 leading-relaxed cursor-pointer">
                    Estou ciente e concordo com os <a href="termos.html" target="_blank" class="font-black text-blue-600 hover:underline">Termos de Serviço e Privacidade (LGPD)</a>.
                </label>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-slate-900 text-white p-4 md:p-5 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-xl shadow-blue-900/10 mt-4 md:mt-6 text-sm md:text-base">
                Acessar Plataforma
            </button>
        </form>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
