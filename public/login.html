<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera | Acesso</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen px-6 py-12">

    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black italic tracking-tighter text-slate-900">SYNTHERA<span class="text-blue-600">.</span></h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Plataforma de Inteligência e Carreira</p>
        </div>

        <div class="flex bg-slate-100 p-1 rounded-2xl mb-8">
            <button type="button" id="btn-aluno" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white text-blue-600 shadow-sm transition-all"><i class="fa-solid fa-graduation-cap mr-2"></i>Aluno</button>
            <button type="button" id="btn-gestor" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-500 hover:text-blue-600 transition-all"><i class="fa-solid fa-user-tie mr-2"></i>Gestor</button>
        </div>

        <div id="auth-tabs" class="flex mb-8 border-b border-slate-100">
            <button id="tab-login" class="flex-1 pb-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600">Entrar</button>
            <button id="tab-register" class="flex-1 pb-3 text-sm font-bold text-slate-400">Cadastre-se</button>
        </div>

        <form id="auth-form" class="space-y-4">
            
            <div id="register-fields" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nome Completo</label>
                    <input type="text" id="nome" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="Ex: Matheus Monteiro">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">CPF</label>
                        <input type="text" id="cpf" maxlength="14" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="000.000.000-00">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">CEP</label>
                        <input type="text" id="cep" maxlength="9" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="00000-000">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cidade/UF (Automático)</label>
                        <input type="text" id="cidade-uf" disabled class="w-full p-4 bg-slate-200 border border-slate-100 rounded-2xl outline-none text-slate-500" placeholder="Aguardando CEP...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Número</label>
                        <input type="text" id="numero" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="Ex: 123">
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">E-mail</label>
                <input type="email" id="email" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="seu@email.com">
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Senha Forte</label>
                <input type="password" id="senha" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition" placeholder="••••••••">
                <p id="senha-hint" class="text-xs text-slate-400 mt-2 hidden"><i class="fa-solid fa-circle-info text-blue-500"></i> A senha deve ter no mínimo 8 caracteres, incluindo letras e números.</p>
            </div>

            <div id="termos-box" class="hidden mt-4 p-4 bg-blue-50 border border-blue-100 rounded-2xl flex items-start gap-3">
                <input type="checkbox" id="termos" class="mt-1 w-5 h-5 accent-blue-600 cursor-pointer">
                <label for="termos" class="text-xs text-slate-600 leading-relaxed cursor-pointer">
                    Estou ciente e concordo com os <a href="termos.html" target="_blank" class="font-black text-blue-600 hover:underline">Termos de Serviço e Privacidade</a> e autorizo o tratamento dos meus dados conforme as diretrizes da <strong>LGPD (Lei nº 13.709/2018)</strong>.
                </label>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-xl shadow-blue-900/10 mt-6">
                Acessar Plataforma
            </button>
        </form>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
