<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Synthera | Painel de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex min-h-screen font-sans text-slate-900">
    
    <aside class="w-20 md:w-72 bg-slate-900 text-white p-6 flex flex-col transition-all">
        <h2 class="hidden md:block text-2xl font-black mb-12 tracking-tighter italic text-blue-500">SYNTHERA<span class="text-white">.PRO</span></h2>
        <i class="fa-solid fa-brain md:hidden text-2xl text-blue-500 mb-12 text-center"></i>
        
        <nav class="space-y-4 flex-grow">
            <a href="#" class="bg-blue-600 p-4 rounded-xl flex items-center justify-center md:justify-start gap-3 font-bold shadow-lg shadow-blue-900/20"><i class="fa-solid fa-chart-pie"></i> <span class="hidden md:block">Dashboard</span></a>
            <a href="index.html" class="p-4 rounded-xl flex items-center justify-center md:justify-start gap-3 hover:bg-slate-800 transition text-slate-400 hover:text-white"><i class="fa-solid fa-globe"></i> <span class="hidden md:block">Ver Site</span></a>
        </nav>
        
        <button onclick="localStorage.clear(); location.href='login.html'" class="text-slate-500 hover:text-red-400 p-4 font-bold transition flex items-center justify-center md:justify-start gap-3">
            <i class="fa-solid fa-power-off"></i> <span class="hidden md:block">Sair</span>
        </button>
    </aside>

    <main class="flex-grow p-6 md:p-12 overflow-y-auto h-screen">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-slate-900">Visão Geral da Plataforma</h1>
            <p class="text-slate-500 font-bold mt-1">Acompanhamento de KPIs e Engajamento DISC</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                <div>
                    <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Base de Alunos</span>
                    <h2 class="text-4xl font-black mt-1" id="kpi-alunos">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-xl"><i class="fa-solid fa-users"></i></div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                <div>
                    <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Testes Concluídos</span>
                    <h2 class="text-4xl font-black mt-1 text-slate-900" id="kpi-testes">0</h2>
                </div>
                <div class="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500 text-xl"><i class="fa-solid fa-check-double"></i></div>
            </div>

            <div class="bg-blue-600 p-6 rounded-3xl shadow-xl shadow-blue-600/20 flex items-center justify-between text-white relative overflow-hidden">
                <div class="relative z-10">
                    <span class="text-blue-200 text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div> Ativos Agora</span>
                    <h2 class="text-4xl font-black mt-1" id="kpi-ativos">0</h2>
                </div>
                <i class="fa-solid fa-satellite-dish text-6xl text-white/10 absolute -right-2 -bottom-2 z-0"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm lg:col-span-1">
                <h3 class="text-xl font-black mb-6">Mapeamento de Perfis</h3>
                <div id="chart-container" class="space-y-5"></div>
            </div>

            <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black">Últimas Avaliações</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 text-slate-400 text-xs uppercase tracking-wider">
                                <th class="pb-4 font-bold">Aluno</th>
                                <th class="pb-4 font-bold">Perfil Dominante</th>
                                <th class="pb-4 font-bold text-right">Data / Hora</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-testes" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
