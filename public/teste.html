<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera | Avaliação DISC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#0f172a',
                            500: '#3b82f6',
                            400: '#60a5fa',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Impede o scroll horizontal indesejado e suaviza transições */
        body { overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen flex flex-col selection:bg-blue-100">

    <header class="bg-white shadow-sm py-3 md:py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="index.html" class="font-black text-lg md:text-2xl tracking-tighter text-brand-900 uppercase">
                SYNTHERA<span class="text-brand-500">.</span>
            </a>
            <span class="text-[10px] md:text-sm font-black text-gray-500 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest" id="progress-text">
                Iniciando...
            </span>
        </div>
    </header>

    <div class="w-full bg-slate-200 h-1.5 md:h-2 sticky top-[52px] md:top-[64px] z-40">
        <div class="bg-brand-500 h-full transition-all duration-500 ease-out shadow-[0_0_10px_rgba(59,130,246,0.5)]" id="progress-bar" style="width: 0%;"></div>
    </div>

    <main class="flex-grow flex items-center justify-center py-6 md:py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl w-full bg-white p-6 md:p-12 rounded-[2rem] md:rounded-[3rem] shadow-2xl shadow-slate-200/60 border border-slate-100 relative overflow-hidden">
            
            <div class="min-h-[80px] md:min-h-[100px] flex items-center justify-center mb-8">
                <h2 class="text-xl md:text-3xl font-black text-slate-800 text-center leading-tight tracking-tight select-none" id="question-text">
                    Carregando matriz de dados...
                </h2>
            </div>

            <form id="quiz-form" class="space-y-3 md:space-y-4">
                </form>

            <div class="mt-8 md:mt-12 flex justify-between items-center pt-6 md:pt-8 border-t border-slate-50">
                <button type="button" id="btn-voltar" class="text-slate-400 hover:text-brand-500 font-bold text-sm md:text-base px-4 py-2 transition-all flex items-center gap-2 hidden">
                    <i class="fa-solid fa-chevron-left text-xs"></i> Anterior
                </button>
                
                <button type="button" id="btn-proxima" class="ml-auto bg-brand-900 hover:bg-brand-500 text-white font-black py-3.5 md:py-4 px-8 md:px-12 rounded-2xl shadow-xl shadow-brand-900/20 transition-all hover:-translate-y-0.5 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-3 text-sm md:text-base">
                    Continuar <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>

            <div class="mt-6 text-center">
                <p class="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">
                    <i class="fa-solid fa-shield-halved text-emerald-500/50 mr-1"></i> Ambiente de Avaliação Seguro
                </p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
