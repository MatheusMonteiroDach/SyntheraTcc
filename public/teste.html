<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera | Avaliação DISC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#0f172a',
                            500: '#3b82f6',
                            400: '#60a5fa',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="index.html" class="font-black text-xl tracking-tighter text-brand-900">
                SYNTHERA<span class="text-brand-500">.</span>
            </a>
            <span class="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full" id="progress-text">Iniciando...</span>
        </div>
    </header>

    <div class="w-full bg-gray-200 h-2">
        <div class="bg-brand-500 h-2 transition-all duration-500 ease-in-out" id="progress-bar" style="width: 0%;"></div>
    </div>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl w-full bg-white p-8 sm:p-10 rounded-2xl shadow-xl shadow-slate-200/50 border border-gray-100 relative overflow-hidden">
            
            <h2 class="text-2xl sm:text-3xl font-black text-slate-800 mb-8 text-center leading-tight" id="question-text">
                Carregando pergunta...
            </h2>

            <form id="quiz-form" class="space-y-4"></form>

            <div class="mt-10 flex justify-between items-center pt-6 border-t border-gray-100">
                <button type="button" id="btn-voltar" class="text-gray-400 hover:text-brand-500 font-bold px-4 py-2 transition-colors hidden">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Anterior
                </button>
                <button type="button" id="btn-proxima" class="ml-auto bg-brand-900 hover:bg-brand-500 text-white font-bold py-4 px-10 rounded-xl shadow-lg shadow-brand-900/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    Próxima <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>

        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
